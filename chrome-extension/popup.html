<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            min-height: 200px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .header img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .header p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 2px;
        }

        .capture-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        .capture-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
        }

        .capture-btn:active {
            transform: translateY(0);
        }

        .shortcut-hint {
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .shortcut-hint kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 16px 0;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #10b981;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-top: 16px;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        .status-dot.disconnected {
            background: #ef4444;
            animation: none;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* Error Overlay Styles */
        .error-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 30, 46, 0.98);
            backdrop-filter: blur(8px);
            z-index: 100;
            padding: 24px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .error-icon {
            font-size: 32px;
            margin-bottom: 16px;
            background: rgba(239, 68, 68, 0.2);
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }

        .error-title {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .error-desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .error-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .error-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* API Key Settings */
        .settings-section {
            margin-top: 12px;
        }

        .settings-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 0;
            width: 100%;
            text-align: left;
        }

        .settings-toggle:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .settings-content {
            display: none;
            margin-top: 8px;
        }

        .settings-content.show {
            display: block;
        }

        .api-key-input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 12px;
            font-family: monospace;
            outline: none;
            transition: border-color 0.2s;
        }

        .api-key-input:focus {
            border-color: rgba(16, 185, 129, 0.6);
        }

        .api-key-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .save-key-btn {
            margin-top: 8px;
            width: 100%;
            padding: 8px;
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 8px;
            color: #10b981;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .save-key-btn:hover {
            background: rgba(16, 185, 129, 0.3);
        }

        .key-status {
            font-size: 11px;
            margin-top: 6px;
            color: rgba(255, 255, 255, 0.5);
        }

        .key-status.saved {
            color: #10b981;
        }
    </style>
</head>

<body>
    <div class="header">
        <img src="icons/icon48.png" alt="StudyHub">
        <div>
            <h1>Quick Capture</h1>
            <p>Save screenshots to Notes</p>
        </div>
    </div>

    <!-- Error Overlay -->
    <div class="error-overlay" id="errorOverlay">
        <div class="error-icon">⚠️</div>
        <div class="error-title">Restricted Page</div>
        <div class="error-desc">
            Chrome blocks extensions on internal pages like this one for security.
            <br><br>
            Please try on a <b>regular website</b>!
        </div>
        <button class="error-btn" id="closeError">Got it</button>
    </div>

    <button class="capture-btn" id="captureBtn">
        <span>📸</span>
        <span>Capture Screenshot</span>
    </button>

    <p class="shortcut-hint">or press <kbd>Alt+S</kbd> anywhere</p>

    <div class="divider"></div>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-value" id="noteCount">-</div>
            <div class="stat-label">Notes</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="captureCount">0</div>
            <div class="stat-label">Captured Today</div>
        </div>
    </div>

    <div class="connection-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Connecting to StudyHub...</span>
    </div>

    <script src="popup.js"></script>
</body>

</html>
