        function VideoApp() {
            const [data, setData] = useState(VIDEO_DATA);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [selectedSubject, setSelectedSubject] = useState(null);
            const [selectedChapter, setSelectedChapter] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');


            // Organize data (Copied logic from TelegramVideos.jsx)
            const organizedData = useMemo(() => {
                if (!data?.videos) return {};
                const organized = {};

                // First pass: Initialize subjects from metadata if available
                if (data.subjects) {
                    Object.keys(data.subjects).forEach(sub => {
                        organized[sub] = { chapters: {}, count: 0 };
                    });
                }

                data.videos.forEach(video => {
                    const subject = video.subject || 'General';
                    const chapter = video.chapter || 'Other';

                    if (!organized[subject]) {
                        organized[subject] = { chapters: {}, count: 0 };
                    }
                    if (!organized[subject].chapters[chapter]) {
                        organized[subject].chapters[chapter] = [];
                    }

                    organized[subject].chapters[chapter].push(video);
                    organized[subject].count++;
                });
                return organized;
            }, [data]);

            const filteredContent = useMemo(() => {
                if (!organizedData) return null;

                if (searchQuery) {
                    // Global Search Mode
                    let results = [];
                    Object.entries(organizedData).forEach(([subject, subjectData]) => {
                        // Search in chapters
                        Object.keys(subjectData.chapters).forEach(chapter => {
                            if (chapter.toLowerCase().includes(searchQuery.toLowerCase())) {
                                results.push({ type: 'chapter', name: chapter, subject });
                            }
                        });

                        // Search in videos
                        Object.entries(subjectData.chapters).forEach(([chapterName, videos]) => {
                            videos.forEach(video => {
                                if (video.lesson?.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                    video.caption?.toLowerCase().includes(searchQuery.toLowerCase())) {
                                    results.push({ type: 'video', video, subject, chapter: chapterName });
                                }
                            });
                        });
                    });
                    return { type: 'search', results };
                }

                if (selectedChapter) {
                    // Video List Mode
                    const videos = organizedData[selectedSubject]?.chapters[selectedChapter] || [];
                    return { type: 'videos', items: videos };
                }

                if (selectedSubject) {
                    // Chapter List Mode
                    const chapters = organizedData[selectedSubject]?.chapters ? Object.keys(organizedData[selectedSubject].chapters) : [];
                    return { type: 'chapters', items: chapters };
                }

                // Subject List Mode
                return { type: 'subjects', items: Object.keys(organizedData) };

            }, [organizedData, selectedSubject, selectedChapter, searchQuery]);

            const handleBack = () => {
                if (selectedChapter) setSelectedChapter(null);
                else if (selectedSubject) setSelectedSubject(null);
            };

            if (loading) return (
                <div className="flex items-center justify-center h-screen bg-black text-white">
                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-cyan-500"></div>
                </div>
            );

            if (error) return (
                <div className="flex items-center justify-center h-screen bg-black text-red-500">
                    Error: {error}
                </div>
            );

            return (
                <div className="min-h-screen bg-black text-gray-100 font-sans">
                    {/* Header */}
                    <header className="sticky top-0 z-50 bg-black/80 backdrop-blur-xl border-b border-white/10">
                        <div className="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                {(selectedSubject || selectedChapter) && (
                                    <button onClick={handleBack} className="p-2 hover:bg-white/10 rounded-full transition-colors">
                                        <Icons.ChevronRight className="w-5 h-5 rotate-180 text-gray-400" />
                                    </button>
                                )}
                                <div className="flex items-center gap-2 text-sm font-medium">
                                    <span
                                        onClick={() => { setSelectedSubject(null); setSelectedChapter(null); setSearchQuery(''); }}
                                        className={`cursor-pointer hover:text-white ${!selectedSubject ? 'text-white' : 'text-gray-500'}`}
                                    >
                                        Library
                                    </span>
                                    {selectedSubject && (
                                        <>
                                            <Icons.ChevronRight className="w-4 h-4 text-gray-600" />
                                            <span
                                                onClick={() => setSelectedChapter(null)}
                                                className={`cursor-pointer hover:text-white ${!selectedChapter ? 'text-' + SUBJECT_CONFIG[selectedSubject]?.color.split('-')[1] + '-400' : 'text-gray-500'}`}
                                            >
                                                {selectedSubject}
                                            </span>
                                        </>
                                    )}
                                    {selectedChapter && (
                                        <>
                                            <Icons.ChevronRight className="w-4 h-4 text-gray-600" />
                                            <span className="text-white truncate max-w-[200px]">{selectedChapter}</span>
                                        </>
                                    )}
                                </div>
                            </div>
                            <div className="relative w-64 md:w-96">
                                <Icons.Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" />
                                <input
                                    type="text"
                                    placeholder="Search videos..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full bg-white/5 border border-white/10 rounded-full pl-10 pr-4 py-2 text-sm focus:outline-none focus:border-cyan-500/50 focus:bg-white/10 transition-all"
                                />
                            </div>
                        </div>
                    </header>

                    {/* Content */}
                    <main className="max-w-7xl mx-auto px-6 py-8">
                        {/* SUBJECTS */}
                        {filteredContent.type === 'subjects' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                {filteredContent.items.map(subject => {
                                    const config = SUBJECT_CONFIG[subject] || SUBJECT_CONFIG['General'];
                                    return (
                                        <div
                                            key={subject}
                                            onClick={() => { setSelectedSubject(subject); setSearchQuery(''); }}
                                            className={`group relative h-48 rounded-2xl bg-gray-900 border border-white/10 hover:border-white/30 overflow-hidden cursor-pointer transition-all duration-300 hover:scale-[1.02] hover:shadow-2xl ${config.glow}`}
                                        >
                                            <div className={`absolute inset-0 bg-gradient-to-br ${config.bg} opacity-20 group-hover:opacity-100 transition-opacity duration-500`} />
                                            {/* Extra gradient overlay for pop */}
                                            <div className={`absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-60`} />

                                            <div className="absolute inset-0 p-6 flex flex-col justify-end relative z-10">
                                                <h3 className="text-3xl font-bold text-white mb-2 tracking-tight group-hover:translate-x-1 transition-transform">{subject}</h3>
                                                <p className="text-sm text-gray-300 font-medium flex items-center gap-2">
                                                    <span className="bg-black/30 backdrop-blur-md px-3 py-1 rounded-full border border-white/10">
                                                        {organizedData[subject]?.count || 0} Videos
                                                    </span>
                                                </p>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* CHAPTERS */}
                        {filteredContent.type === 'chapters' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {filteredContent.items.map(chapter => (
                                    <div
                                        key={chapter}
                                        onClick={() => { setSelectedChapter(chapter); setSearchQuery(''); }}
                                        className={`flex items-center p-4 bg-white/5 border border-white/5 rounded-xl hover:bg-white/10 hover:border-white/20 cursor-pointer transition-all group hover:shadow-lg`}
                                    >
                                        <div className={`p-3 rounded-lg bg-gray-900 shadow-inner ${SUBJECT_CONFIG[selectedSubject]?.color}`}>
                                            <Icons.FolderOpen className="w-6 h-6" />
                                        </div>
                                        <div className="ml-4 flex-1 min-w-0">
                                            <h4 className="text-base font-medium text-gray-200 truncate group-hover:text-white transition-colors">
                                                {chapter}
                                            </h4>
                                            <p className="text-xs text-gray-500 mt-1">
                                                {organizedData[selectedSubject]?.chapters[chapter]?.length || 0} Videos
                                            </p>
                                        </div>
                                        <div className={`p-1.5 rounded-full bg-white/5 group-hover:bg-white/10 transition-colors`}>
                                            <Icons.ChevronRight className="w-4 h-4 text-gray-500 group-hover:text-white" />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* VIDEOS */}
                        {filteredContent.type === 'videos' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                {filteredContent.items.map(video => (
                                    <VideoCard key={video.id} video={video} subject={selectedSubject} />
                                ))}
                            </div>
                        )}

                        {/* SEARCH RESULTS */}
                        {filteredContent.type === 'search' && (
                            <div className="space-y-8">
                                <h2 className="text-xl font-bold text-white">Search Results</h2>
                                {filteredContent.results.length === 0 && <p className="text-gray-500">No matches found.</p>}
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                    {filteredContent.results.map((item, i) => {
                                        if (item.type === 'video') return <VideoCard key={i} video={item.video} subject={item.subject} />;
                                        return null; // Chapters hidden in search for simplicity
                                    })}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        function VideoCard({ video, subject }) {
            const isPDF = !video.isVideo;
            const config = SUBJECT_CONFIG[subject] || SUBJECT_CONFIG['General'];

            const openInTelegram = () => {
                const urlParts = video.telegramUrl.split('/');
                const id = urlParts.pop();
                const channel = urlParts.pop();
                const tgUrl = `tg://resolve?domain=${channel}&post=${id}`;
                window.location.href = tgUrl;
            };

            return (
                <div
                    onClick={openInTelegram}
                    className="group bg-gray-900 rounded-xl overflow-hidden border border-white/5 hover:border-white/20 transition-all hover:shadow-2xl hover:-translate-y-1 cursor-pointer"
                >
                    <div className="relative aspect-video bg-gray-950 overflow-hidden">
                        <div className={`absolute inset-0 bg-gradient-to-br ${config.bg} opacity-20 group-hover:opacity-30 transition-opacity`} />
                        <div className="absolute inset-0 flex items-center justify-center">
                            {isPDF ? (
                                <Icons.FileText className="w-12 h-12 text-gray-600 group-hover:text-white transition-colors" />
                            ) : (
                                <Icons.Video className="w-12 h-12 text-gray-600 group-hover:text-white transition-colors" />
                            )}
                        </div>
                        {!isPDF && (
                            <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-300 bg-black/40 backdrop-blur-[2px]">
                                <div className={`w-12 h-12 rounded-full ${config.gradient} flex items-center justify-center shadow-lg`}>
                                    <Icons.Play className="w-5 h-5 text-white ml-1" />
                                </div>
                            </div>
                        )}
                        <div className="absolute bottom-2 right-2 px-1.5 py-0.5 bg-black/80 rounded text-[10px] text-gray-300 flex items-center gap-1 font-mono">
                            {isPDF ? 'PDF' : (video.duration ? <><Icons.Clock className="w-3 h-3" /> {video.duration}</> : '')}
                        </div>
                    </div>
                    <div className="p-4">
                        <h4 className="text-sm font-medium text-gray-200 line-clamp-2 min-h-[2.5em] group-hover:text-white transition-colors">
                            {video.caption?.replace(/\[.*?\]/g, '').trim() || 'Untitled'}
                        </h4>
                        <div className="mt-2 text-xs text-gray-500">{video.fileSize}</div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<VideoApp />);
    </script>
